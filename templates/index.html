<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EduAI Chat</title>

<style>

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.chat{
    width:500px;
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    margin-top:0;
}

input{
    width:72%;
    padding:10px;
    font-size:16px;
}

button{
    padding:10px 18px;
    cursor:pointer;
    font-size:16px;
}

.chat-box{
    margin-top:20px;
    background:#f8f8f8;
    border-radius:10px;
    padding:15px;
    height:320px;
    overflow-y:auto;
}

.usuario{
    background:#d1ecf1;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    /* Respeta los saltos de línea (\n) y espacios múltiples del texto */
    white-space:pre-line;
}

.bot{
    background:#d4edda;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
    /* Respeta los saltos de línea (\n) y espacios múltiples del texto */
    white-space:pre-line;
}

</style>

</head>

<body>

<div class="chat">

<h2>🤖 EduAI</h2>

<input
id="mensaje"
type="text"
placeholder="Escribe un mensaje">

<button onclick="enviar()">
Enviar
</button>

<div id="respuesta" class="chat-box"></div>

</div>

<script>

const chat=document.getElementById("respuesta");

// Escapa caracteres HTML del mensaje del usuario y del bot antes de insertarlos,
// para que un mensaje como "<script>" no se interprete como HTML.
function escaparHtml(texto){
    const div=document.createElement("div");
    div.textContent=texto;
    return div.innerHTML;
}

async function enviar(){

    const mensaje=document.getElementById("mensaje").value.trim();

    if(mensaje==""){
        return;
    }

    chat.innerHTML += `
        <div class="usuario">
            <strong>Tú:</strong><br>${escaparHtml(mensaje)}
        </div>
    `;

    chat.scrollTop=chat.scrollHeight;

    document.getElementById("mensaje").value="";

    try{

        const respuesta=await fetch("/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json",
                "X-API-KEY":"EduAI2026"
            },

            body:JSON.stringify({
                mensaje:mensaje
            })

        });

        const datos=await respuesta.json();

        chat.innerHTML += `
            <div class="bot">
                <strong>EduAI:</strong><br>${escaparHtml(datos.respuesta)}
            </div>
        `;

    }catch(error){

        chat.innerHTML += `
            <div class="bot">
                <strong>Error:</strong><br>No se pudo conectar con el servidor.
            </div>
        `;

    }

    chat.scrollTop=chat.scrollHeight;

}

document.getElementById("mensaje").addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        enviar();
    }

});

</script>

</body>

</html>
